version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: finguard-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - finguard-network

  ml_service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: finguard-ml
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - MODEL_PATH=app/ml/artifacts/best_model.joblib
    volumes:
      - ml-artifacts:/app/app/ml/artifacts
    networks:
      - finguard-network
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: finguard-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/finguard
      - JWT_SECRET=finguard_jwt_secret_key_2024
      - JWT_EXPIRE=7d
      - ML_SERVICE_URL=http://ml_service:8000
    depends_on:
      - mongo
      - ml_service
    networks:
      - finguard-network
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: finguard-client
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api
    depends_on:
      - server
    networks:
      - finguard-network

volumes:
  mongo-data:
  ml-artifacts:

networks:
  finguard-network:
    driver: bridge
